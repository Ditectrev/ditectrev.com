# CI and deploy pipeline.
# Node 24, pnpm, all checks; audit does not fail the pipeline; Lighthouse CI; deploy SSR to Firebase.
# Feature branches deploy to the staging Firebase project; main/master deploy to production.
# Required GitHub Secrets: see .github/SECRETS.md (if present) or project docs.

name: CI

on:
  push:
    branches: [main, master, feature, "feature/**"]
  pull_request:
    branches: [main, master, feature, "feature/**"]

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.0"
  NODE_OPTIONS: "--openssl-legacy-provider"

jobs:
  security-audit:
    name: Dependencies audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Run audit but do not fail the pipeline (findings are reported only).
      - name: Run audit
        run: pnpm exec audit-ci --low || true

  lint:
    name: Lint (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  format:
    name: Code format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "src/**/*.{ts,html,scss,json}" "*.json" || true

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e

  build-staging:
    name: Build (staging)
    runs-on: ubuntu-latest
    environment: Preview
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      FIRESTORE_COLLECTION_FILES: ${{ secrets.FIRESTORE_COLLECTION_FILES }}
      FIRESTORE_COLLECTION_MESSAGES: ${{ secrets.FIRESTORE_COLLECTION_MESSAGES }}
      GOOGLE_TAG_MANAGER_ID: ${{ secrets.GOOGLE_TAG_MANAGER_ID }}
      MAIL_ACCOUNT: ${{ secrets.MAIL_ACCOUNT }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAILCHIMP_SUBSCRIBE_ENDPOINT: ${{ secrets.MAILCHIMP_SUBSCRIBE_ENDPOINT }}
      MAILCHIMP_B_FIELD: ${{ secrets.MAILCHIMP_B_FIELD }}
      RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:ssr

  build-production:
    name: Build (production)
    runs-on: ubuntu-latest
    environment: Production
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      FIRESTORE_COLLECTION_FILES: ${{ secrets.FIRESTORE_COLLECTION_FILES }}
      FIRESTORE_COLLECTION_MESSAGES: ${{ secrets.FIRESTORE_COLLECTION_MESSAGES }}
      GOOGLE_TAG_MANAGER_ID: ${{ secrets.GOOGLE_TAG_MANAGER_ID }}
      MAIL_ACCOUNT: ${{ secrets.MAIL_ACCOUNT }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAILCHIMP_SUBSCRIBE_ENDPOINT: ${{ secrets.MAILCHIMP_SUBSCRIBE_ENDPOINT }}
      MAILCHIMP_B_FIELD: ${{ secrets.MAILCHIMP_B_FIELD }}
      RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:ssr:production

  deploy-firebase-preview:
    name: Deploy to Firebase Hosting (preview)
    runs-on: ubuntu-latest
    needs: [lint, test, build-staging]
    environment: Preview
    permissions:
      contents: read
      id-token: write
    # Deploy full SSR previews for any feature/* branch pushes to the staging Firebase project.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Build and deploy SSR app to Firebase staging project
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIRESTORE_COLLECTION_FILES: ${{ secrets.FIRESTORE_COLLECTION_FILES }}
          FIRESTORE_COLLECTION_MESSAGES: ${{ secrets.FIRESTORE_COLLECTION_MESSAGES }}
          GOOGLE_TAG_MANAGER_ID: ${{ secrets.GOOGLE_TAG_MANAGER_ID }}
          MAIL_ACCOUNT: ${{ secrets.MAIL_ACCOUNT }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAILCHIMP_SUBSCRIBE_ENDPOINT: ${{ secrets.MAILCHIMP_SUBSCRIBE_ENDPOINT }}
          MAILCHIMP_B_FIELD: ${{ secrets.MAILCHIMP_B_FIELD }}
          RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
          FIREBASE_DEPLOY_KEY: ${{ secrets.FIREBASE_DEPLOY_KEY }}
          CI_ENVIRONMENT_SLUG: development
        run: pnpm run build-and-deploy:ssr:staging:firebase

  deploy-firebase-production:
    name: Deploy to Firebase Hosting (production SSR)
    runs-on: ubuntu-latest
    needs: [lint, test, build-production]
    environment: Production
    permissions:
      contents: read
      id-token: write
    # Deploy production only from main/master pushes.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Build and deploy SSR app to Firebase
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIRESTORE_COLLECTION_FILES: ${{ secrets.FIRESTORE_COLLECTION_FILES }}
          FIRESTORE_COLLECTION_MESSAGES: ${{ secrets.FIRESTORE_COLLECTION_MESSAGES }}
          GOOGLE_TAG_MANAGER_ID: ${{ secrets.GOOGLE_TAG_MANAGER_ID }}
          MAIL_ACCOUNT: ${{ secrets.MAIL_ACCOUNT }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAILCHIMP_SUBSCRIBE_ENDPOINT: ${{ secrets.MAILCHIMP_SUBSCRIBE_ENDPOINT }}
          MAILCHIMP_B_FIELD: ${{ secrets.MAILCHIMP_B_FIELD }}
          RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
          FIREBASE_DEPLOY_KEY: ${{ secrets.FIREBASE_DEPLOY_KEY }}
          CI_ENVIRONMENT_SLUG: production
        run: pnpm run build-and-deploy:ssr:production:firebase

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build-production]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build --configuration production
      - name: Install Lighthouse CI
        run: pnpm add -D @lhci/cli@0.13.x
      - name: Run Lighthouse
        run: pnpm exec lhci autorun

  observatory:
    name: Mozilla Observatory (ditectrev.com)
    runs-on: ubuntu-latest
    # Third-party API often returns 502 for long stretches; we retry heavily then skip with a warning
    # so PRs are not blocked by mozilla.org outages. Check https://observatory.mozilla.org/ manually if needed.
    steps:
      - name: Run Observatory scan
        id: observatory
        run: |
          set -euo pipefail
          HOST="ditectrev.com"
          API="https://http-observatory.security.mozilla.org/api/v1"

          json_ok() {
            jq -e . >/dev/null 2>&1
          }

          echo "Starting Observatory scan for $HOST..."

          # POST /analyze — API frequently returns 502 + HTML; retry then give up without failing the workflow
          for attempt in $(seq 1 15); do
            HTTP=$(curl -sS --retry 2 --retry-delay 8 -o /tmp/scan_start.json -w "%{http_code}" \
              -X POST "$API/analyze" -d "host=$HOST" -d "rescan=true" || true)
            if [ "$HTTP" = "200" ] && json_ok < /tmp/scan_start.json; then
              echo "Scan accepted (HTTP $HTTP)"
              cat /tmp/scan_start.json
              break
            fi
            echo "Observatory POST returned HTTP $HTTP or non-JSON (attempt $attempt/15); retry in 45s..."
            head -c 400 /tmp/scan_start.json 2>/dev/null || true
            echo
            if [ "$attempt" -eq 15 ]; then
              echo "::warning::Mozilla Observatory API unavailable after 15 attempts (often HTTP 502). Skipping scan — verify manually at https://observatory.mozilla.org/analyze.html?host=$HOST"
              exit 0
            fi
            sleep 45
          done

          # Poll GET /analyze?host= until FINISHED or FAILED
          for i in $(seq 1 36); do
            sleep 10
            HTTP=$(curl -sS -o /tmp/scan_poll.json -w "%{http_code}" "$API/analyze?host=$HOST" || true)
            if [ "$HTTP" != "200" ] || ! json_ok < /tmp/scan_poll.json; then
              echo "Poll $i: HTTP $HTTP or non-JSON; retrying..."
              head -c 200 /tmp/scan_poll.json 2>/dev/null || true
              echo
              continue
            fi
            STATE=$(jq -r '.state // empty' /tmp/scan_poll.json)
            echo "Scan state: $STATE"
            if [ "$STATE" = "FINISHED" ]; then
              cp /tmp/scan_poll.json /tmp/scan_result.json
              break
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "Scan failed"
              jq . /tmp/scan_poll.json
              exit 1
            fi
          done

          if [ ! -f /tmp/scan_result.json ]; then
            echo "Scan did not finish in time"
            exit 1
          fi

          GRADE=$(jq -r '.grade' /tmp/scan_result.json)
          SCORE=$(jq -r '.score' /tmp/scan_result.json)
          echo "Observatory grade: $GRADE (score: $SCORE)"
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          if [[ ! "$GRADE" == A* ]]; then
            echo "Grade $GRADE is below A (expected A+, A, or A-)"
            exit 1
          fi
          echo "Observatory scan passed with grade $GRADE"
