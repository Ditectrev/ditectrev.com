<div class="gallery-container">
  <h2 class="gallery-title">What can we do for You?</h2>

  <div class="gallery">
    <div class="gallery-main">
      <div class="gallery-slide" *ngFor="let image of images; let i = index"
           [class.active]="i === currentIndex"
           [@slideAnimation]="i === currentIndex ? 'in' : 'out'">
        <img [src]="image.src" [alt]="image.title">
        <div class="gallery-info">
          <h3>{{image.title}}</h3>
          <p>{{image.description}}</p>
          <a [routerLink]="image.link" class="gallery-link">Learn More</a>
        </div>
      </div>
    </div>

    <div class="gallery-controls">
      <button class="gallery-control" (click)="previous()">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="gallery-dots">
        <button *ngFor="let image of images; let i = index"
                class="gallery-dot"
                [class.active]="i === currentIndex"
                (click)="goTo(i)">
        </button>
      </div>
      <button class="gallery-control" (click)="next()">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>
